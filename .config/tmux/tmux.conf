# Miozu tmux config - Server Edition
# Last updated: 2026-01-03

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix key: Ctrl+a (more ergonomic than Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start windows/panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse support
set -g mouse on

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# No escape delay (important for neovim)
set -sg escape-time 0

# Increase scrollback
set -g history-limit 50000

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Status bar - Tokyo Night inspired
set -g status-position bottom
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'
set -g status-left-length 30
set -g status-right-length 50

set -g status-left '#[fg=#7aa2f7,bold][#S] '
set -g status-right '#[fg=#9ece6a]#{?client_prefix,#[fg=#f7768e]PREFIX ,}#[fg=#bb9af7]#H #[fg=#7dcfff]%H:%M'

# Window status
setw -g window-status-current-style 'fg=#7aa2f7 bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=#565f89'
setw -g window-status-format ' #I:#W#F '

# Pane borders
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

# Message style
set -g message-style 'fg=#7aa2f7 bg=#1a1b26 bold'

# Clock
setw -g clock-mode-colour '#7aa2f7'

# Enable focus events (for vim/neovim)
set -g focus-events on
