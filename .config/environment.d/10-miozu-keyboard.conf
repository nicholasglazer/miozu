# Miozu keyboard layout — read by systemd user session on login.
# Applies to every Wayland compositor / graphical app launched via the user
# systemd session (teruwm, Hyprland, Sway, GNOME, etc.).
#
# For TTY-launched sessions that don't go through systemd-logind's user
# manager, run-teruwm.sh also exports these as a fallback.
#
# Layouts: US Dvorak (default) + Ukrainian (secondary).
# Toggle: Alt+Shift.  Caps Lock acts as Escape.

XKB_DEFAULT_LAYOUT=us,ua
XKB_DEFAULT_VARIANT=dvorak,
XKB_DEFAULT_OPTIONS=grp:alt_shift_toggle,caps:escape
